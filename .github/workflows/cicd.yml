name: CI/CD

on:
    push:
        branches: [main]
    pull_request:
        branches: [main]

jobs:
    backend-lint:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6
            - name: Install uv
              uses: astral-sh/setup-uv@v7
              with:
                  version: "latest"
                  enable-cache: true
            - name: Set up Python
              run: uv python install 3.14
            - name: Install dependencies
              run: uv sync --dev
              working-directory: backend
            - name: Ruff check
              run: uv run ruff check .
              working-directory: backend
            - name: Ruff format check
              run: uv run ruff format --check .
              working-directory: backend

    backend-test:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6
            - name: Install uv
              uses: astral-sh/setup-uv@v7
              with:
                  version: "latest"
                  enable-cache: true
            - name: Set up Python
              run: uv python install 3.14
            - name: Install dependencies
              run: uv sync --dev
              working-directory: backend
            - name: Run tests
              run: uv run pytest --cov=main --cov=models --cov=database --cov=usernames --cov-report=term-missing:skip-covered --cov-fail-under=80
              working-directory: backend
              env:
                  DATABASE_URL: sqlite:///
                  JWT_SECRET: ci-test-secret-at-least-thirty-two-chars

    backend-migrations:
        runs-on: ubuntu-latest
        services:
            postgres:
                image: postgres:18-alpine
                env:
                    POSTGRES_USER: playlink
                    POSTGRES_PASSWORD: playlink
                    POSTGRES_DB: playlink
                ports:
                    - 5432:5432
                options: >-
                    --health-cmd "pg_isready -U playlink"
                    --health-interval 10s
                    --health-timeout 5s
                    --health-retries 5
        env:
            DATABASE_URL: postgresql+psycopg://playlink:playlink@localhost:5432/playlink
        steps:
            - uses: actions/checkout@v6
            - name: Install uv
              uses: astral-sh/setup-uv@v7
              with:
                  version: "latest"
                  enable-cache: true
            - name: Set up Python
              run: uv python install 3.14
            - name: Install dependencies
              run: uv sync --dev
              working-directory: backend
            - name: Apply migrations to a clean Postgres
              run: uv run alembic upgrade head
              working-directory: backend
            - name: Round-trip last migration (downgrade -1, upgrade head)
              run: uv run alembic downgrade -1 && uv run alembic upgrade head
              working-directory: backend
            - name: Detect model/migration drift
              run: uv run alembic check
              working-directory: backend

    frontend-lint:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6
            - uses: oven-sh/setup-bun@v2
              with:
                  bun-version: latest
            - name: Install dependencies
              run: bun install --frozen-lockfile
              working-directory: frontend
            - name: Lint
              run: bun run lint
              working-directory: frontend
            - name: Format check
              run: bun x prettier --check .
              working-directory: frontend

    frontend-test:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6

            - uses: oven-sh/setup-bun@v2
              with:
                  bun-version: latest

            - name: Install dependencies
              run: bun install --frozen-lockfile
              working-directory: frontend

            - name: Run tests
              run: bun run test -- --coverage
              working-directory: frontend

    build-test:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6
            - name: Build Docker images
              run: docker compose build

    deploy:
        needs: [backend-lint, backend-test, backend-migrations, frontend-lint, build-test]
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        runs-on: ubuntu-latest
        environment: production

        steps:
            - name: Connect to Tailscale
              uses: tailscale/github-action@v4
              with:
                  authkey: ${{ secrets.TS_AUTHKEY }}

            - name: Deploy via SSH
              uses: appleboy/ssh-action@v1
              env:
                  POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
                  JWT_SECRET: ${{ secrets.JWT_SECRET }}
                  SERVER_HOST: ${{ secrets.SERVER_HOST }}
              with:
                  host: ${{ secrets.SERVER_HOST }}
                  username: ${{ secrets.SERVER_USER }}
                  key: ${{ secrets.SERVER_SSH_KEY }}
                  envs: POSTGRES_PASSWORD,JWT_SECRET,SERVER_HOST
                  script: |
                      cd ~/playlink

                      cat > .env << EOF
                      POSTGRES_USER=${{ vars.POSTGRES_USER }}
                      POSTGRES_PASSWORD=$POSTGRES_PASSWORD
                      POSTGRES_DB=${{ vars.POSTGRES_DB }}
                      POSTGRES_HOST=db
                      POSTGRES_PORT=5432
                      DATABASE_URL=postgresql+psycopg://${{ vars.POSTGRES_USER }}:$POSTGRES_PASSWORD@db:5432/${{ vars.POSTGRES_DB }}
                      JWT_SECRET=$JWT_SECRET
                      JWT_ALGORITHM=${{ vars.JWT_ALGORITHM }}
                      NONCE_EXPIRATION_MINUTES=${{ vars.NONCE_EXPIRATION_MINUTES }}
                      JWT_EXPIRATION_MINUTES=${{ vars.JWT_EXPIRATION_MINUTES }}
                      ORIGIN=https://playlink.bartek.monster
                      ADMIN_ADDRESSES=${{ secrets.ADMIN_ADDRESSES }}
                      EOF

                      cat > frontend/.env << EOF
                      PUBLIC_WS_URL=wss://${{ secrets.PUBLIC_BACKEND_URL }}
                      PUBLIC_BACKEND_URL=https://${{ secrets.PUBLIC_BACKEND_URL }}
                      EOF

                      git pull origin main
                      export DOCKER_BUILDKIT=1
                      docker compose up --build -d
