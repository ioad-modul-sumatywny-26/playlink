name: CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  backend-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"
          enable-cache: true
      - name: Set up Python
        run: uv python install 3.14
      - name: Install dependencies
        run: uv sync --dev
        working-directory: backend
      - name: Ruff check
        run: uv run ruff check .
        working-directory: backend
      - name: Ruff format check
        run: uv run ruff format --check .
        working-directory: backend

  frontend-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install dependencies
        run: bun install --frozen-lockfile
        working-directory: frontend
      - name: Lint
        run: bun run lint
        working-directory: frontend
      - name: Format check
        run: bun x prettier --check .
        working-directory: frontend

  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker images
        run: docker compose build

  deploy:
    name: Deploy to Production
    needs: [backend-lint, frontend-lint, build-test]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Tailscale Tunnel
        uses: tailscale/github-action@v3
        with:
          oauth-client-id: ${{ secrets.TAILSCALE_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TAILSCALE_OAUTH_SECRET }}
          tags: tag:ci

      - name: Install SSH Key
        uses: shimataro/ssh-key-action@v2
        with:
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          known_hosts: unnecessary
          if_key_exists: fail

      - name: Deploy Over Tunnel
        env:
          DOCKER_HOST: "ssh://${{ secrets.REMOTE_USER }}@${{ secrets.REMOTE_TS_IP }}"
        run: |
          # Architecting for fun: Build and push layers directly to remote daemon
          docker compose up -d --build --remove-orphans
