name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  backend-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"
          enable-cache: true
      - name: Set up Python
        run: uv python install 3.14
      - name: Install dependencies
        run: uv sync --dev
        working-directory: backend
      - name: Ruff check
        run: uv run ruff check .
        working-directory: backend
      - name: Ruff format check
        run: uv run ruff format --check .
        working-directory: backend

  backend-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"
          enable-cache: true
      - name: Set up Python
        run: uv python install 3.14
      - name: Install dependencies
        run: uv sync --dev
        working-directory: backend
      - name: Run tests
        run: uv run pytest
        working-directory: backend
        env:
          DATABASE_URL: sqlite:///
          JWT_SECRET: ci-test-secret-at-least-thirty-two-chars

  frontend-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install dependencies
        run: bun install --frozen-lockfile
        working-directory: frontend
      - name: Lint
        run: bun run lint
        working-directory: frontend
      - name: Format check
        run: bun x prettier --check .
        working-directory: frontend

  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker images
        run: docker compose build
